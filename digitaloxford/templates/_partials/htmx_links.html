{% load wagtailcore_tags wagtailimages_tags %}
<ul class="links list-reset" id="links">
    {% for link in links %}
        <li class="link">
            <a href="{{ link.link }}">

                <div class="details">
                    <h2>{{ link.title }}</h2>

                    {% if link.description %}

                        <p class="description">{{ link.description }}</p>

                    {% endif %}

                    {% if link.testimonial %}

                        <blockquote>{{ link.testimonial }}</blockquote>

                    {% endif %}
                </div>
            </a>
        </li>
    {% endfor %}
</ul>
